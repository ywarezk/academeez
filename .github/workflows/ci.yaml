name: CI

# we release to dev on regular push to main
# we release to prod on tagged version
on:
  push:
    branches:
      - main
  create:
    tags:
      - v*

permissions: write-all
jobs:

  # Find what affected apps we need to build
  affected:
    runs-on: ubuntu-latest
    outputs:
      affectedApps: ${{ steps.affectedAppsLibs.outputs.apps }}
      affectedLibs: ${{ steps.affectedAppsLibs.outputs.libs }}
      affectedAll: ${{ steps.affectedAppsLibs.outputs.all }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}
          service_account: ${{ secrets.SA_GA }}

      - name: Affected apps/libs
        uses: ./.github/actions/affected
        id: affectedAppsLibs

  # lint only the effected apps and libs
  lint:
    needs: affected
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        appsLibs: ${{ fromJson(needs.affected.outputs.affectedAll) }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}
          service_account: ${{ secrets.SA_GA }}

      - uses: ./.github/actions/nrwl
        with:
          project: ${{ matrix.appsLibs }}
          target: lint

  # run the unit tests
  test:
    needs: affected
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        appsLibs: ${{ fromJson(needs.affected.outputs.affectedAll) }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}
          service_account: ${{ secrets.SA_GA }}

      - name: Prepare api
        id: secrets
        uses: 'google-github-actions/get-secretmanager-secrets@v0'
        with:
          secrets: |-
            githubToken:${{ secrets.PROJECT_COMMON }}/github-token

      - name: Test
        uses: ./.github/actions/nrwl
        env:
          GITHUB_TOKEN: '${{ steps.secrets.outputs.githubToken }}'
        with:
          project: ${{ matrix.appsLibs }}
          target: test

  # run build
  build:
    needs: affected
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        appsLibs: ${{ fromJson(needs.affected.outputs.affectedAll) }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}
          service_account: ${{ secrets.SA_GA }}

      - uses: ./.github/actions/nrwl
        with:
          project: ${{ matrix.appsLibs }}
          target: build

  # run e2e tests
  e2e:
    needs:
      - build
      - lint
      - test
      - affected
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        appsLibs: ${{ fromJson(needs.affected.outputs.affectedAll) }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}
          service_account: ${{ secrets.SA_GA }}

      - name: Start app
        run: npm start & npx nx run ${{ matrix.appsLibs }}:e2e



