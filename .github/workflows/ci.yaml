name: CI

on:
  push:
    branches:
      - "main"
  create:
    tags:
      - v*

jobs:

  # Find what effected apps we need to build
  effected:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 16.14.2
          cache: npm
      - run: npm ci

      - name: Effected apps/libs
        uses: ./.github/actions/effected



