# 
# This will trigger the E2E workflow.
# IMPORTANT: this is always taken from main - so if this is changed in branch it won't be applied
# until this is merged to main
# This behaviour is because the repository_dispatch trigger
#
# Created August 16th, 2025
# @author ywarezk
# @license MIT
# 

name: Trigger E2E
  
on:
  repository_dispatch:
    types:
      - 'vercel.deployment.success'  
jobs:
  run-e2es:    
    runs-on: ubuntu-latest
    steps:                
      - uses: actions/create-github-app-token@v2.1.1
        id: app-token
        with:
          app-id: ${{ vars.ACADEMEEZ_APP_ID }}
          private-key: ${{ secrets.ACADEMEEZ_APP_PRIVATE_KEY }}
          
      - name: Trigger workflow with SHA
        uses: actions/github-script@v7
        if: ${{ github.event.client_payload.environment != 'production' }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const payload = context.payload.client_payload || {}
            const sha = payload.git?.sha || ''
            const prNumber = payload.meta?.githubPullRequestId || payload.pullRequest?.number
            const defaultBranch = context.payload.repository?.default_branch || 'main'
            let ref = payload.git?.branch || payload.git?.ref || defaultBranch

            // For same-repo commits this gives us a normal branch name.
            if (sha) {
              try {
                const { data: branches } = await github.rest.repos.listBranchesForHeadCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: sha,
                })
                if (branches.length) {
                  ref = branches[0].name
                }
              } catch (error) {
                core.info(`Could not resolve branch from SHA ${sha}: ${error.message}`)
              }
            }

            // Fork PR commits are often not on a local branch in the base repo.
            // In that case, use GitHub's pull ref if we have the PR number.
            if ((!sha || ref === defaultBranch) && prNumber) {
              ref = `refs/pull/${prNumber}/head`
            }

            core.info(`Dispatching E2E with ref=${ref} sha=${sha || 'n/a'}`)
          
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'e2e.yml', // Replace with your workflow file name
              ref,
              inputs: {
                ref,
                sha,
                url: `${{ github.event.client_payload.url }}`
              }
            });
          
      